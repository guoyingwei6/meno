name = "meno-worker"
main = "src/index.ts"
compatibility_date = "2025-03-24"

[[d1_databases]]
binding = "DB"
database_name = "meno"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "meno-assets"

[triggers]
crons = ["0 3 * * *"]

[vars]
APP_ORIGIN = "https://your-frontend-domain"
API_ORIGIN = "https://your-worker-domain"
ASSET_PUBLIC_BASE_URL = "https://your-worker-domain/api/assets"
GITHUB_ALLOWED_LOGIN = "your-github-username"
GITHUB_CLIENT_ID = "your-github-oauth-client-id"
# Secrets (set via `npx wrangler secret put`):
#   GITHUB_CLIENT_SECRET
#   SESSION_SECRET
#   API_TOKEN
